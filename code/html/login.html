<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
    <title>小米登录</title>

    <!-- 引入Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css">

    <!-- 引入自定义CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- 头部导航栏 -->
    <header>
        <nav class="navbar navbar-expand-lg navbar-light">
            <a class="navbar-brand" href="#">
                <img src="img\milogo.jpg" alt="小米logo" width="200px" height="100px">
            </a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" 
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="login.html">登录</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="register.html">注册</a>
                    </li>
                </ul>
            </div>
        </nav>
    </header>

    <!-- 主内容区域 -->
    <main class="container">
        <h2 class="text-center mb-4">登录</h2>
        <form>
            <div class="form-group">
                <label for="loginUsername">用户名/手机号</label>
                <input type="text" class="form-control" id="loginUsername" placeholder="请输入用户名或手机号">
            </div>
            <div class="form-group">
                <label for="loginPassword">密码</label>
                <input type="password" class="form-control" id="loginPassword" placeholder="请输入密码">
            </div>
            <button type="submit" class="form-control btn btn-primary">登录</button>
        </form>

        <div class="form-group mt-3">
            <label for="loginMethod">其他登录方式</label>
            <select class="form-control" id="loginMethod">
                <option value="phone">手机号登录</option>
                <option value="weibo">微博登录</option>
                <option value="qq">QQ登录</option>
            </select>
        </div>

        <div class="mt-3 text-center">
            <a href="#">忘记密码</a> | <a href="register.html">注册新账号</a>
        </div>
    </main>

    <!-- 底部 -->
    <footer class="text-center">
        <p>© 2023 小米公司</p>
    </footer>

    <!-- 引入Bootstrap和jQuery脚本 -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- 引入自定义JavaScript -->
    <script src="scripts.js"></script>
</body>
</html>
