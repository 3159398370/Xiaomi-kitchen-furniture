<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小米注册</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <!-- 头部导航栏 -->
    <header>
        <nav class="navbar navbar-expand-lg navbar-light">
            <a class="navbar-brand" href=" ">
                <img src="../img/小米.png" alt="小米logo" width="200px" height="100px">
            </a >
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="login.html">登录</a >
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="register.html">注册</a >
                    </li>
                </ul>
            </div>
        </nav>
    </header>

    <!-- 主内容区域 -->
    <main class="container">
        <h2 class="text-center mb-4">注册</h2>
        <form>
            <div class="form-group">
                <label for="registerUsername">用户名</label>
                <input type="text" class="form-control" id="registerUsername" placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label for="registerPhone">手机号</label>
                <input type="text" class="form-control" id="registerPhone" placeholder="请输入手机号">
            </div>
            <div class="form-group">
                <label for="registerPassword">密码</label>
                <input type="password" class="form-control" id="registerPassword" placeholder="请输入密码">
            </div>
            <div class="form-group">
                <label for="confirmPassword">确认密码</label>
                <input type="password" class="form-control" id="confirmPassword" placeholder="请再次输入密码">
            </div>
            <button type="submit" class="btn btn-primary">注册</button>
        </form>
        <div class="mt-3 text-center">
            已有账号，登录
            <a href="login.html">立即登录</a >
        </div>
    </main>

    <!-- 底部 -->
    <footer class="text-center">
        <p>© 2023 小米公司</p >
    </footer>

</body>
</html>
